name: Bruno Lint on Pull Request

on:
  pull_request:
    paths:
      - 'bruno/**/*.bru'
      - 'bruno/scripts/lint-bruno.cjs'
      - 'bruno/package.json'
      - '.github/workflows/on-pullrequest-lint-bruno.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'bruno/scripts/lint-bruno.cjs'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./bruno
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run Bruno linter (JSON output)
        id: lint
        run: |
          set -e
          node scripts/lint-bruno.cjs --json > lint-report.json || true
          cat lint-report.json
          ERRORS=$(jq '.summary.errors' lint-report.json)
          if [ "$ERRORS" != "0" ]; then
            echo "::error::Bruno lint failed with $ERRORS error(s).";
            exit 1;
          fi

      - name: Upload lint report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bruno-lint-report
          path: bruno/lint-report.json
          if-no-files-found: warn

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('bruno/lint-report.json','utf8'));
            const { summary } = report;
            const body = [
              '### Bruno Lint Report',
              `Files Scanned: **${summary.filesScanned}**`,
              `Problems: **${summary.problems}** (Errors: ${summary.errors}, Warnings: ${summary.warnings})`,
              summary.errors === 0 ? ':white_check_mark: No blocking errors.' : ':x: Errors present. Please fix.',
              '',
              'Triggered by workflow: lint-bruno.yml'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
