name: DataStandard V5

on:
  pull_request:
    paths:
      - 'scripts/run-scenarios.cjs'
      - 'bruno/Tests/v5/**'
      - 'bruno/SIS/v5/**'
      - '.github/workflows/on-pullrequest-run-tests-v5.yml'
  push:
    branches: [ main ]
    paths:
      - 'scripts/run-scenarios.cjs'
      - 'bruno/Tests/v5/**'
      - 'bruno/SIS/v5/**'
  workflow_dispatch:
    inputs:
      env:
        description: 'Bruno environment name (default ci-v5.ed-fi.org)'
        required: false
        default: 'ci-v5.ed-fi.org'
      includeSteps:
        description: 'Include detailed steps in aggregate summary'
        required: false
        default: 'false'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: qa-scenarios-v5-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: bruno/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix bruno
          echo "$GITHUB_WORKSPACE/bruno/node_modules/.bin" >> $GITHUB_PATH

      - name: Inject credentials into Bruno environment file
        env:
          CLIENT_ID: ${{ secrets.EDFI_CLIENT_ID_V5 }}
          CLIENT_SECRET: ${{ secrets.EDFI_CLIENT_SECRET_V5 }}
          BRUNO_ENV: ${{ github.event.inputs.env || 'ci-v5.ed-fi.org' }}
        run: |
          ENV_FILE="bruno/Tests/environments/${BRUNO_ENV}.bru"
          if [ ! -f "$ENV_FILE" ]; then echo "ERROR: env file not found: $ENV_FILE"; exit 1; fi
          ENV_FILE="$ENV_FILE" node -e "
            const fs = require('fs');
            const f = process.env.ENV_FILE;
            let c = fs.readFileSync(f, 'utf8');
            c = c.replace(/edFiClientId:.*/, 'edFiClientId: ' + process.env.CLIENT_ID);
            c = c.replace(/edFiClientSecret:.*/, 'edFiClientSecret: ' + process.env.CLIENT_SECRET);
            fs.writeFileSync(f, c);
          "

      - name: Mask client secret (if present)
        env:
          BRUNO_ENV: ${{ github.event.inputs.env || 'ci-v5.ed-fi.org' }}
        run: |
          ENV_FILE="bruno/Tests/environments/${BRUNO_ENV}.bru"
          if [ -f "$ENV_FILE" ]; then
            SECRET_LINE=$(grep -E 'edFiClientSecret:' "$ENV_FILE" || true)
            if [ -n "$SECRET_LINE" ]; then
              SECRET_VAL=$(echo "$SECRET_LINE" | sed -E 's/.*edFiClientSecret:\s*([^ ]+)/\1/')
              echo "::add-mask::$SECRET_VAL"
            fi
          fi

      - name: Run QA Scenarios
        id: runqa
        env:
          BRUNO_ENV: ${{ github.event.inputs.env || 'ci-v5.ed-fi.org' }}
          INCLUDE_STEPS: ${{ github.event.inputs.includeSteps || 'false' }}
        run: |
          set -e
          INCLUDE_FLAG=""
          if [ "$INCLUDE_STEPS" = "true" ]; then INCLUDE_FLAG="--include-steps"; fi
          node scripts/run-scenarios.cjs --env "$BRUNO_ENV" --version v5 $INCLUDE_FLAG || EXIT=$?
          # Preserve non-zero exit for later; script already writes summary.json
          if [ -n "$EXIT" ]; then echo "exit_code=$EXIT" >> $GITHUB_OUTPUT; else echo "exit_code=0" >> $GITHUB_OUTPUT; fi

      - name: Show aggregate summary
        if: always()
        run: |
          if [ -f automation-testing/results/summary.json ]; then
            cat automation-testing/results/summary.json | jq '.' || cat automation-testing/results/summary.json
          else
            echo "summary.json not found"
          fi

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: qa-scenarios-results-v5
          path: |
            automation-testing/results/summary.json
            automation-testing/results/*.json
            automation-testing/results/last-output.txt
          if-no-files-found: warn

      - name: Comment summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summaryPath = 'automation-testing/results/summary.json';
            if (!fs.existsSync(summaryPath)) {
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: ':warning: QA Scenarios did not produce a summary.json file.'
              });
            } else {
              const data = JSON.parse(fs.readFileSync(summaryPath,'utf8'));
              const lines = [];
              lines.push('### QA Scenarios Summary (DataStandard V5)');
              lines.push(`Status: **${data.exitStatus}**`);
              lines.push(`Entities Processed: **${data.totals.entitiesProcessed}**`);
              lines.push(`Assertions: Passed **${data.totals.assertionsPassed}**, Failed **${data.totals.assertionsFailed}**, Total **${data.totals.assertionsTotal}**`);
              if (data.entities) {
                lines.push('');
                lines.push('| Entity | Passed | Failed | Total |');
                lines.push('|--------|--------|--------|-------|');
                for (const e of data.entities) {
                  const a = e.assertions; lines.push(`| ${e.entity} | ${a.passed} | ${a.failed} | ${a.total} |`);
                }
              }
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: lines.join('\n')
              });
            }

      - name: Fail if scenarios failed
        if: steps.runqa.outputs.exit_code != '0'
        run: |
          echo "Scenario script exited with code ${{ steps.runqa.outputs.exit_code }}"; exit 1
